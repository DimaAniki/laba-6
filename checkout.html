<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Оформление заказа — BookNest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header>
  <h1>Оформление заказа</h1>
  <nav>
    <a href="cart.html">← Назад</a>
  </nav>
</header>

<section class="section">
  <h3>Ваши книги</h3>
  <div id="order-items" class="grid"></div>

  <h3>Контактная информация</h3>
  <form id="checkout-form">
    <div class="form-group">
      <label for="name">Имя</label>
      <input type="text" id="name" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" required>
    </div>
    <div class="form-group">
      <label for="phone">Телефон</label>
      <input type="tel" id="phone" required>
    </div>
    <div class="form-group">
      <label for="address">Адрес доставки</label>
      <textarea id="address" rows="3" required></textarea>
    </div>
    <button type="submit">Оформить заказ</button>
  </form>

  <p id="success-message" style="display: none; color: green; margin-top: 1rem;">
    Заказ успешно оформлен! Спасибо за покупку.
  </p>
</section>

<script src="js/checkout.js"></script>
</body>
</html>
