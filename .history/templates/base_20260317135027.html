<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BookNest{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <h1>BookNest</h1>
        <nav>
            <a href="{% url 'main:home' %}">Каталог</a>
            <a href="{% url 'products:catalog' %}">Все книги</a>
            <a href="{% url 'cart:cart' %}">
                Корзина (<span id="cart-count">{{ cart.total_items|default:0 }}</span>)
            </a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 BookNest — интернет-магазин книг</p>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
